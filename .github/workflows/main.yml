name: Build FakeSNI for Android

on:
  workflow_dispatch: # این خط به شما اجازه میده با یک دکمه بیلد را شروع کنید

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21' # نسخه زبان گو

    - name: Build for Android (ARM64)
      run: |
        GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o FakeSNI-Android main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: FakeSNI-Android-App
        path: FakeSNI-Android
