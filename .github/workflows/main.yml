name: Build FakeSNI for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build for Android (ARM64)
      run: |
        GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o FakeSNI-Android main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeSNI-Android-App
        path: FakeSNI-Android
